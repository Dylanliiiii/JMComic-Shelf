name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build with PyAppify
        uses: ok-oldking/pyappify-action@v1.0.22
        with:
          version: "v1.1.6"

      - name: Upload GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            JMComic Shelf Windows desktop release.

            This release is packaged with PyAppify. The launcher installs and updates the Python application from GitHub tags.
          files: pyappify_dist/*
